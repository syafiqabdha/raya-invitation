version: '3.8'

services:
  raya-invitation:
    build: .
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      # Optional: For persistent storage of RSVP data
      - ./rsvp-data:/usr/share/nginx/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.raya-invitation.rule=Host(`your-domain.com`)"
      - "traefik.http.routers.raya-invitation.entrypoints=websecure"
      - "traefik.http.routers.raya-invitation.tls=true"